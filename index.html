<!DOCTYPE html>
<html>
<head>
    <title>student information sheet</title>
    <style>
        body{
            font-family:Arial,sans-serif;
            margin:30px;
        }
        h2{
          text-align:center;
        }
        table{
            width:60%;
            margin:auto;
        }
        td{
          padding:10px;
        }
        input,taxtarea,select{
            width:100%
            padding:5px;
        }
        .submit-btn{
            text-align:center;
        }
        </style>
      </head>
       </body>

       <h2>student personal details and qualification form</h2>

       <form>
          <table >
            <tr>
               <td>full name</td>
               <td><input type="text"name="name"></td>
            </tr>

            <tr>
               <td>father's name</td>
               <td><input type="text"name="father"></td>
            </tr>

            <tr>
                <td>date of birth</td>
               <td><input type ="date"name="dob"></td>
            </tr>

            <tr>
                <td>gender</td>
                <td>
                    <input type="radio"name="gender">male
                    <input type="radio"name="gender">female
                    <input type="radio"name="gender">other
                </td>
            </tr>
            
            <tr>
                <td>addres</td>
                <td>textarea rows="3"</td>
            </tr>
    
            <tr>
                <td>phone number</td>
                <td><input type="tel" name="phone"></td>
            </tr>

            <tr>
                <td>emali</td>
                <td><input type="text"name="college"></td>
            </tr>

            <tr>
                <td>highest qualification</td>
                <td>
                    <select>
                        <option>10th pass</option>
                        <option>12th pass</option>
                        <option>diploma</option>
                        <option>graduate</option>
                        <option>post graduate</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>school/college name</td>
                <td><input type="text"name="college"></td>
            </tr>

            <tr>
                <td>percentage/cgpa</td>
                <td><input type="text"name="marks"></td>
            </tr>

            <tr>
                <td>skills</td>
                <td><textarea rows="2"></textarea></td>
            </tr>

            <tr>
                <td colspan="2"class="submit-btn">
                  <input type="submit"value="submit">
                  <input type="reset"value="reset">
                </td>
            </tr>
        </table>
    </form>

    </body>
    </html>
